[package]
name = "tetris-cli"
version = "23.96.14"
edition = "2021"
description = "Классическая игра Тетрис для терминала Linux/Unix"
license = "GPL-3.0"
repository = "https://github.com/Githab-capibara/tetris-cli"
documentation = "https://github.com/Githab-capibara/tetris-cli/tree/master/docs"
readme = "README.md"
keywords = ["tetris", "game", "terminal", "cli", "rust"]
categories = ["games", "command-line-utilities"]

# Документация для rustdoc
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
# Feature для бенчмарков - используется в game.rs для методов *_for_bench
bench = []

[dependencies]
termion = "2.0"
rand = "0.8.4"
confy = "0.4.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
blake3 = "1.5"
hex = "0.4"
directories = "5.0"
libc = "0.2"
fs2 = "0.4"

[dev-dependencies]
tempfile = "3.10"
criterion = "0.5"

[[bench]]
name = "benchmarks"
harness = false
required-features = ["bench"]

# Настройки линтера clippy
[lints.clippy]
# Рекомендуемые проверки
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
# Исключения для pedantic
module_name_repetitions = "allow"
must_use_candidate = "allow"
too_many_lines = "allow"
too_many_arguments = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
cast_possible_truncation = "allow"
